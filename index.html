<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greyhound Pro Tips</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Logic -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuration
        const APP_NAME = "GREYHOUND PRO";
        const TRAP_COLORS = {
            1: { bg: 'bg-red-600', text: 'text-white' },
            2: { bg: 'bg-blue-600', text: 'text-white' },
            3: { bg: 'bg-white', text: 'text-slate-900', border: 'border-slate-300' },
            4: { bg: 'bg-slate-900', text: 'text-white' },
            5: { bg: 'bg-orange-500', text: 'text-white' },
            6: { bg: 'bg-white', text: 'text-slate-900', border: 'border-slate-900 border-dashed' }
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('tips');
            const [isAdmin, setIsAdmin] = useState(false);
            const [tips, setTips] = useState(() => {
                const saved = localStorage.getItem('pro_tips_v1');
                return saved ? JSON.parse(saved) : [
                    { id: 1, venue: "Example Track", time: "19:00", dog: "Fast Runner", trap: 1, verdict: "Excellent early pace expected.", odds: "2/1" }
                ];
            });

            const [analyzer, setAnalyzer] = useState({ trap: 1, avgTime: 29.5, splitTime: 4.4 });
            const [score, setScore] = useState(null);

            useEffect(() => {
                localStorage.setItem('pro_tips_v1', JSON.stringify(tips));
            }, [tips]);

            const updateTip = (id, field, value) => setTips(tips.map(t => t.id === id ? { ...t, [field]: value } : t));
            const addTip = () => setTips([{ id: Date.now(), venue: "New Track", time: "00:00", dog: "New Dog", trap: 1, verdict: "Enter verdict...", odds: "EVS" }, ...tips]);
            const deleteTip = (id) => setTips(tips.filter(t => t.id !== id));

            const calculate = () => {
                const s = Math.round(50 + (29.6 - analyzer.avgTime) * 40);
                setScore(Math.min(100, Math.max(0, s)));
            };

            return (
                <div className="min-h-screen pb-20">
                    <header className="bg-indigo-900 text-white p-5 shadow-lg flex justify-between items-center sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <i data-lucide="trophy" class="text-yellow-400"></i>
                            <h1 className="font-black italic tracking-tighter text-xl">{APP_NAME}</h1>
                        </div>
                        <button onClick={() => setIsAdmin(!isAdmin)} className="opacity-30 hover:opacity-100 transition-opacity">
                            <i data-lucide="settings"></i>
                        </button>
                    </header>

                    <main className="max-w-md mx-auto p-4">
                        {isAdmin && (
                            <div className="mb-4 p-4 bg-amber-50 border-2 border-dashed border-amber-300 rounded-xl flex justify-between items-center">
                                <span className="font-bold text-amber-800 text-xs uppercase">Editor Enabled</span>
                                <button onClick={addTip} className="bg-amber-600 text-white px-3 py-1 rounded-lg text-xs font-bold">ADD TIP</button>
                            </div>
                        )}

                        <div className="flex bg-white p-1 rounded-xl shadow-sm mb-6 border border-slate-200">
                            <button onClick={() => setActiveTab('tips')} className={`flex-1 py-3 rounded-lg font-bold text-xs ${activeTab === 'tips' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>TODAY'S TIPS</button>
                            <button onClick={() => setActiveTab('analyzer')} className={`flex-1 py-3 rounded-lg font-bold text-xs ${activeTab === 'analyzer' ? 'bg-indigo-600 text-white' : 'text-slate-400'}`}>PRO ANALYZER</button>
                        </div>

                        {activeTab === 'tips' ? (
                            <div className="space-y-4">
                                {tips.map(tip => (
                                    <div key={tip.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm relative group transition-all hover:border-indigo-300">
                                        {isAdmin && <button onClick={() => deleteTip(tip.id)} className="absolute -top-2 -right-2 bg-red-500 text-white p-1 rounded-full"><i data-lucide="trash-2" size="14"></i></button>}
                                        <div className="flex gap-4">
                                            <div className={`w-14 h-14 rounded-xl flex flex-col items-center justify-center font-black text-xl border-2 ${TRAP_COLORS[tip.trap].bg} ${TRAP_COLORS[tip.trap].text} ${TRAP_COLORS[tip.trap].border || ''}`}>
                                                {isAdmin ? (
                                                    <select value={tip.trap} onChange={(e) => updateTip(tip.id, 'trap', parseInt(e.target.value))} className="bg-transparent outline-none">
                                                        {[1,2,3,4,5,6].map(n => <option key={n} value={n}>{n}</option>)}
                                                    </select>
                                                ) : tip.trap}
                                            </div>
                                            <div className="flex-grow">
                                                <div className="flex justify-between">
                                                    <div>
                                                        {isAdmin ? <div className="flex gap-1 mb-1"><input className="border text-[10px] w-16" value={tip.venue} onChange={(e) => updateTip(tip.id, 'venue', e.target.value)}/><input className="border text-[10px] w-10" value={tip.time} onChange={(e) => updateTip(tip.id, 'time', e.target.value)}/></div> : <p className="text-[10px] font-bold text-indigo-600 uppercase mb-1">{tip.venue} • {tip.time}</p>}
                                                        {isAdmin ? <input className="border font-bold text-sm w-full" value={tip.dog} onChange={(e) => updateTip(tip.id, 'dog', e.target.value)}/> : <h3 className="font-bold text-slate-900">{tip.dog}</h3>}
                                                    </div>
                                                    <div className="text-right">
                                                        {isAdmin ? <input className="border font-black text-sm w-12 text-center" value={tip.odds} onChange={(e) => updateTip(tip.id, 'odds', e.target.value)}/> : <p className="font-black text-lg text-slate-800">{tip.odds}</p>}
                                                    </div>
                                                </div>
                                                {isAdmin ? <textarea className="w-full text-xs mt-2 border h-12" value={tip.verdict} onChange={(e) => updateTip(tip.id, 'verdict', e.target.value)}/> : <p className="text-[11px] text-slate-500 mt-2 bg-slate-50 p-2 rounded-lg italic leading-tight">"{tip.verdict}"</p>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                          <div className="bg-white p-8 rounded-3xl border border-slate-200 text-center shadow-lg">
                            <h2 className="font-black text-xl mb-6 italic tracking-tighter">DATA ANALYZER</h2>
                            <div className="space-y-4 mb-6">
                                <div className="text-left">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase">Average Time</label>
                                    <input type="number" step="0.01" className="w-full p-4 bg-slate-50 border rounded-xl font-bold" value={analyzer.avgTime} onChange={(e) => setAnalyzer({...analyzer, avgTime: e.target.value})}/>
                                </div>
                            </div>
                            <button onClick={calculate} className="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all">GET WIN PROBABILITY</button>
                            {score !== null && (
                                <div className="mt-8 animate-bounce">
                                    <p className="text-6xl font-black text-indigo-600">{score}%</p>
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Confidence Score</p>
                                </div>
                            )}
                          </div>
                        )}
                        <p className="mt-12 text-[9px] text-center text-slate-400 uppercase font-bold tracking-widest leading-loose">
                            18+ Only • Gamble Responsibly • No Financial Advice
                        </p>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Load Icons after React render
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
